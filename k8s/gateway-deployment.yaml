# k8s/gateway-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-gateway
  labels: { app: inference-gateway, component: gateway }
spec:
  replicas: 2
  selector: { matchLabels: { app: inference-gateway } }
  template:
    metadata: { labels: { app: inference-gateway } }
    spec:
      containers:
      - name: gateway
        image: inference-gateway:latest
        ports: [{ containerPort: 9999, name: tcp-gateway }]
        env: [{ name: LB_WORKERS, value: "inference-workers:10001" }]
        resources:
          requests: { cpu: "250m", memory: "128Mi" }
          limits:   { cpu: "1000m", memory: "256Mi" }
        readinessProbe: { tcpSocket: { port: 9999 }, initialDelaySeconds: 3 }
        livenessProbe:  { tcpSocket: { port: 9999 }, initialDelaySeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: inference-gateway }
spec:
  type: LoadBalancer
  selector: { app: inference-gateway }
  ports:
  - { port: 9999, targetPort: 9999, name: tcp-gateway }
  - { port: 8000, targetPort: 8000, name: rest }
